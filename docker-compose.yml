# Local self-host / dev path (ARCHITECTURE §11, §12 Phase 0).
# `docker compose up -d db redis` gives you Postgres + Redis; run the API with
# uvicorn on the host for fast reloads. The `api` service is here for the
# full self-host story.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shiplog
      POSTGRES_PASSWORD: shiplog
      POSTGRES_DB: shiplog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiplog"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
